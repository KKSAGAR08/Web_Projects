<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix India – Watch TV Shows Online, Watch Movies Online</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
      <div class="nav">
        <img src="items/photo/logo.svg" alt="" />
        <div class="btn1">
          <button class="btn-lang">English</button>
          <button class="btn btn-nav">Sign In</button>
        </div>
      </div>
      <div class="color"></div>
      <div class="elements">
        <span class="firsttext">Unlimited movies, TV shows and more </span>
        <span class="secondtext">Watch anywhere. Cancel anytime.</span>
        <span class="thirdtext">Ready to watch? Enter your email to create or restart your membership.</span>
        <div class="elements2">
          <input type="text" placeholder="Email Address">
          <button class="btn btn-element">Get Started  &gt;</button>
        </div>
      </div>
      <div class="separation"></div>
    </div>
    <section class="first">
      <div class="text">
       <span>Enjoy on your TV</span>
       <span>Watch on smart TVs, PlayStation, Xbox,</span>
       <span>Chromecast, Apple TV, Blu-ray players and </span>
       <span>more.</span>
      </div>
      <div class="tv">
        <img src="items/photo/first_image.png" alt="">
        <video src="items/video/video-tv-in-0819.m4v " autoplay muted loop></video> 
      </div>
    </section>
  </body>
</html>
